name: API CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/slack_off
      SUPABASE_JWT_SECRET: ci-secret
      CONFIG_SOURCE: env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t slack-off-api-ci .
